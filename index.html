<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login - PT Balam Industri</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;

  background: url('img/bg.jpg') no-repeat center center;
  background-size: cover;
}
.box{
  background:white;
  padding:30px;
  border-radius:10px;
  width:400px;
  text-align:center;
}
input{
  width:80%;
  padding:14px;
  font-size:20px;
  border-radius:8px;
}
button{
  padding:14px;
  font-size:25px;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  border:none;
  border-radius:8px;
}
.logo-area{
  margin-bottom:30px;
}
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}
.logo-area{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.logo-area img{
  width:90px;
  height:90px;
  object-fit:contain;
}
.logo-area h2{
  font-size:30px;
  margin:0;
  font-weight:600;
}
</style>
</head>

<body>

<div class="box">
  <div class="logo-area">
  <img src="img/logo.jpg" alt="logo">
  <h2>PT Balam Industri</h2>
</div>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
function login(){
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;

  if(!username || !password){
    alert('Isi username dan password!');
    return;
  }

  fetch('/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      username: username,
      password: password
    })
  })
  .then(res=>{
    if(!res.ok) throw new Error();
    return res.json();
  })
  .then(()=>{
    window.location.href = '/dashboard.html';
  })
  .catch(()=>{
    alert('Username atau password salah!');
  });
}
</script>

</body>
</html>
